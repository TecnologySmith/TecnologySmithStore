<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda PRO</title>

<link rel="icon" href="https://i.ibb.co/zTG22YZ4/unnamed.jpg">

<style>

/* 🌌 BASE */
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */
header{
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
}

h1{
margin:5px;
}

/* BUSCADOR */
.buscador{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

input, select{
padding:10px;
border-radius:10px;
border:none;
}

/* GRID */
.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

/* BADGE */
.categoria{
background:#00f2fe;
color:black;
padding:3px 8px;
border-radius:10px;
font-size:12px;
display:inline-block;
margin-bottom:5px;
}

/* BOTONES */
.boton{
display:block;
margin-top:8px;
padding:10px;
border:none;
border-radius:20px;
cursor:pointer;
background:linear-gradient(45deg,#00f2fe,#4facfe);
color:white;
}

/* CARRITO */
.carrito{
position:fixed;
top:10px;
right:10px;
background:black;
padding:10px;
border-radius:20px;
cursor:pointer;
z-index:1000;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

/* 📱 RESPONSIVE */
@media(max-width:600px){
h1{font-size:20px;}
.card img{height:150px;}
}

</style>
</head>

<body>

<header>
<h1>🚀 TecnologySmith Store</h1>

<div class="buscador">
<input type="text" id="buscar" placeholder="Buscar producto...">
<select id="filtro"></select>
</div>

</header>

<div class="carrito" onclick="verCarrito()">
🛒 <span id="count">0</span>
</div>

<div class="productos" id="productos"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let productosData = [];
let carrito = [];

const LINK_MP = "https://mpago.la/XXXXXXX";
const WEBHOOK = "TU_WEBHOOK_AQUI";

// 🔥 CARGAR DATA
fetch("https://opensheet.elk.sh/1bIcXzZy-yv3Veims11KbIbamG3ruhyspJC0tsCwhge8/Hoja1")
.then(r=>r.json())
.then(data=>{
productosData = data;
renderProductos(data);
cargarCategorias(data);
});

// 🎯 RENDER
function renderProductos(data){
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<div class="categoria">${p.categoria}</div>
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>

<button class="boton" onclick="agregarCarrito('${p.id}')">Agregar</button>
<button class="boton" onclick="comprarDirecto('${p.id}')">Comprar</button>
</div>
`;
});
document.getElementById("productos").innerHTML=html;
}

// 🛒 CARRITO
function agregarCarrito(id){
let p = productosData.find(x=>x.id==id);
carrito.push(p);
document.getElementById("count").innerText = carrito.length;
}

// 💥 WHATSAPP DIRECTO
function comprarDirecto(id){
let p = productosData.find(x=>x.id==id);

let msg = `🛍️ QUIERO COMPRAR
Producto: ${p.nombre}
Categoría: ${p.categoria}
Precio: $${p.precio}
📞 3222117202`;

window.open("https://wa.me/573222117202?text="+encodeURIComponent(msg));
}

// 🔍 BUSCAR
document.getElementById("buscar").addEventListener("input",filtrar);
document.getElementById("filtro").addEventListener("change",filtrar);

function filtrar(){
let texto = document.getElementById("buscar").value.toLowerCase();
let cat = document.getElementById("filtro").value;

let filtrados = productosData.filter(p=>{
return (p.nombre.toLowerCase().includes(texto)) &&
(cat=="" || p.categoria==cat);
});

renderProductos(filtrados);
}

// 🏷️ CATEGORIAS
function cargarCategorias(data){
let categorias = [...new Set(data.map(p=>p.categoria))];

let html = `<option value="">Todas</option>`;
categorias.forEach(c=>{
html += `<option>${c}</option>`;
});

document.getElementById("filtro").innerHTML = html;
}

// 🛒 VER CARRITO
function verCarrito(){

let total=0;
let lista="";

carrito.forEach(p=>{
total+=parseInt(p.precio);
lista+=`${p.nombre} - $${p.precio}\n`;
});

let mensaje = `🛒 PEDIDO
${lista}
Total: $${total}
📞 3222117202`;

let html=`
<h2>Carrito</h2>
<pre>${lista}</pre>
<h3>Total: $${total}</h3>

<button class="boton" onclick="enviarWhats('${encodeURIComponent(mensaje)}')">
WhatsApp
</button>

<a class="boton" href="${LINK_MP}" target="_blank">
Pagar MercadoPago
</a>

<button class="boton" onclick="guardarPedido('${total}','${encodeURIComponent(lista)}')">
Guardar Pedido
</button>

<button class="boton" onclick="cerrar()">Cerrar</button>
`;

document.getElementById("modalContent").innerHTML=html;
document.getElementById("modal").style.display="flex";
}

// 📲 ENVIAR
function enviarWhats(txt){
window.open("https://wa.me/573222117202?text="+txt);
}

// ☁️ GUARDAR PEDIDO
function guardarPedido(total, lista){

fetch(WEBHOOK,{
method:"POST",
body:JSON.stringify({
total:total,
productos:decodeURIComponent(lista)
})
});

alert("Pedido guardado ✅");
}

// ❌ cerrar
function cerrar(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
