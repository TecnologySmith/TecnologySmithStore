<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda PRO</title>

<link rel="icon" href="https://i.ibb.co/zTG22YZ4/unnamed.jpg">

<style>

/* 🌌 ESTILO FUTURISTA */
body{
font-family:'Segoe UI';
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

h1{
margin:20px;
}

/* GRID */
.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* IMG */
.card img{
width:100%;
height:200px;
object-fit:contain;
}

/* BOTONES */
.boton{
display:block;
margin-top:10px;
padding:10px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
border:none;
border-radius:20px;
cursor:pointer;
color:white;
}

.boton:hover{
transform:scale(1.05);
}

/* CARRITO */
.carrito{
position:fixed;
top:10px;
right:10px;
background:black;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<h1>🚀 TecnologySmith Store</h1>

<div class="carrito" onclick="verCarrito()">
🛒 <span id="count">0</span>
</div>

<div class="productos" id="productos"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let productosData = [];
let carrito = [];

// 🔥 LINK MERCADOPAGO (CAMBIAR)
const LINK_MP = "https://mpago.la/XXXXXXX";

// FETCH
fetch("https://opensheet.elk.sh/1bIcXzZy-yv3Veims11KbIbamG3ruhyspJC0tsCwhge8/Hoja1")
.then(r=>r.json())
.then(data=>{

productosData = data;

let html="";

data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>

<button class="boton" onclick="agregarCarrito('${p.id}')">
Agregar al carrito
</button>

<button class="boton" onclick="comprarDirecto('${p.id}')">
Comprar ahora
</button>

</div>
`;
});

document.getElementById("productos").innerHTML=html;

});

// 🛒 AGREGAR
function agregarCarrito(id){
let p = productosData.find(x=>x.id==id);
carrito.push(p);
actualizarCarrito();
alert("Agregado 🛒");
}

function actualizarCarrito(){
document.getElementById("count").innerText = carrito.length;
}

// 💥 COMPRAR DIRECTO
function comprarDirecto(id){
let p = productosData.find(x=>x.id==id);

let mensaje = `🛍️ QUIERO COMPRAR
Producto: ${p.nombre}
Precio: $${p.precio}
📞 3222117202`;

let url = "https://wa.me/573222117202?text=" + encodeURIComponent(mensaje);

window.open(url);
}

// 🛒 VER CARRITO
function verCarrito(){

if(carrito.length==0){
alert("Carrito vacío");
return;
}

let total = 0;
let lista = "";

carrito.forEach(p=>{
total += parseInt(p.precio);
lista += `• ${p.nombre} - $${p.precio}\n`;
});

let mensaje = `🛒 PEDIDO COMPLETO
${lista}
💰 Total: $${total}
📞 3222117202`;

let html = `
<h2>Tu carrito</h2>
<pre>${lista}</pre>
<h3>Total: $${total}</h3>

<button class="boton" onclick="enviarWhatsApp('${encodeURIComponent(mensaje)}')">
Comprar por WhatsApp
</button>

<a class="boton" href="${LINK_MP}" target="_blank">
Pagar con MercadoPago
</a>

<button class="boton" onclick="vaciarCarrito()">
Vaciar carrito
</button>

<button class="boton" onclick="cerrar()">
Cerrar
</button>
`;

document.getElementById("modalContent").innerHTML = html;
document.getElementById("modal").style.display="flex";

}

// 📲 ENVIAR WHATSAPP
function enviarWhatsApp(texto){
window.open("https://wa.me/573222117202?text="+texto);
}

// 🧹 VACIAR
function vaciarCarrito(){
carrito=[];
actualizarCarrito();
cerrar();
}

// ❌ cerrar
function cerrar(){
document.getElementById("modal").style.display="none";
}

// cerrar afuera
window.onclick = function(e){
if(e.target.id=="modal"){
cerrar();
}
}

</script>

</body>
</html>
