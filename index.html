<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Futurista</title>

<link rel="icon" href="https://i.ibb.co/zTG22YZ4/unnamed.jpg">

<style>

/* 🌌 FONDO FUTURISTA */
body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

/* TITULO */
h1{
margin:20px;
font-size:28px;
letter-spacing:2px;
}

/* GRID */
.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:20px;
}

/* CARD FUTURISTA */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
padding:15px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
transition:0.3s;
animation:fadeIn 0.6s ease;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 25px rgba(0,255,255,0.5);
}

/* IMAGEN */
.card img{
width:100%;
height:220px;
object-fit:contain;
border-radius:10px;
transition:0.4s;
}

.card img:hover{
transform:scale(1.08);
}

/* BOTONES */
.boton{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
color:white;
text-decoration:none;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.boton:hover{
transform:scale(1.1);
box-shadow:0 0 10px #00f2fe;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:20px;
border-radius:15px;
width:90%;
max-width:420px;
position:relative;
animation:zoomIn 0.3s ease;
}

/* CARRUSEL */
.carousel img{
width:100%;
height:250px;
object-fit:contain;
border-radius:10px;
}

/* BOTONES CARRUSEL */
.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:#000;
color:#fff;
border:none;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:-10px; }
.next{ right:-10px; }

/* CERRAR */
.close{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
}

/* SHARE */
.share a{
display:inline-block;
margin:5px;
padding:6px 12px;
background:rgba(255,255,255,0.1);
border-radius:10px;
text-decoration:none;
color:white;
transition:0.3s;
}

.share a:hover{
background:#00f2fe;
color:black;
}

/* ANIMACIONES */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes zoomIn{
from{transform:scale(0.8); opacity:0;}
to{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<h1>🚀 TecnologySmith Store</h1>

<div class="productos" id="productos">Cargando productos...</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <span class="close" onclick="cerrar()">✖</span>
  </div>
</div>

<script>

let productosData = [];

fetch("https://opensheet.elk.sh/1bIcXzZy-yv3Veims11KbIbamG3ruhyspJC0tsCwhge8/Hoja1")
.then(res => res.json())
.then(data => {

productosData = data;

let html="";

data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>
<div class="boton" onclick="verProducto('${p.id}')">Ver producto</div>
</div>
`;
});

document.getElementById("productos").innerHTML=html;

})
.catch(()=>{
document.getElementById("productos").innerHTML="<p>Error cargando ❌</p>";
});


// 🔥 VER PRODUCTO
function verProducto(id){

let p = productosData.find(x => String(x.id).trim() === String(id).trim());

let imagenes = [p.imagen, p.imagen2, p.imagen3].filter(x => x);

let current = 0;

let urlActual = window.location.href;

// MENSAJE PARA COMPARTIR
let texto = `🛍️ ${p.nombre}
💰 Precio: $${p.precio}
📞 Contacto: 3222117202
🔗 Ver aquí: ${urlActual}`;

// ENCODE
let textoEncoded = encodeURIComponent(texto);

let html = `
<h2>${p.nombre}</h2>

<div class="carousel">
<button class="btn prev" onclick="cambiar(-1)">❮</button>
<img id="img" src="${imagenes[0]}">
<button class="btn next" onclick="cambiar(1)">❯</button>
</div>

<p>${p.descripcion || ""}</p>

<h3>$${p.precio}</h3>

<a class="boton" target="_blank"
href="https://wa.me/573222117202?text=${textoEncoded}">
Comprar por WhatsApp
</a>

<div class="share">
<p>Compartir:</p>

<a target="_blank" href="https://wa.me/?text=${textoEncoded}">
WhatsApp
</a>

<a target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${urlActual}">
Facebook
</a>

<a onclick="copiarLink('${texto}')" href="#">
Copiar info
</a>

</div>
`;

document.getElementById("modalContent").innerHTML = html;
document.getElementById("modal").style.display="flex";

// carrusel
window.cambiar = function(dir){
current += dir;
if(current < 0) current = imagenes.length -1;
if(current >= imagenes.length) current = 0;
document.getElementById("img").src = imagenes[current];
}

}

// cerrar
function cerrar(){
document.getElementById("modal").style.display="none";
}

// copiar
function copiarLink(texto){
navigator.clipboard.writeText(texto);
alert("Información copiada 🚀");
}

// cerrar afuera
window.onclick = function(e){
if(e.target.id=="modal"){
cerrar();
}
}

</script>

</body>
</html>
